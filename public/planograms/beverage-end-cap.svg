  <!-- Top Banner -->
  <rect x="120" y="85" width="560" height="35" fill="#dc2626" rx="4"/>
  <text x="400" y="108" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">★ FEATURED PROMOTION ★</text>
  
  <!-- Shelf 1 - Featured Products -->
  <rect x="120" y="130" width="560" height="95" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="140" y="145" width="70" height="70" rx="6" fill="#dc2626"/>
  <rect x="220" y="145" width="70" height="70" rx="6" fill="#dc2626"/>
  <rect x="300" y="145" width="70" height="70" rx="6" fill="#dc2626"/>
  <rect x="380" y="145" width="70" height="70" rx="6" fill="#1e40af"/>
  <rect x="460" y="145" width="70" height="70" rx="6" fill="#1e40af"/>
  <rect x="540" y="145" width="70" height="70" rx="6" fill="#1e40af"/>
  <rect x="620" y="145" width="50" height="70" rx="6" fill="#16a34a"/>
  
  <!-- Shelf 2 -->
  <rect x="120" y="235" width="560" height="80" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="135" y="250" width="55" height="55" rx="4" fill="#f97316"/>
  <rect x="200" y="250" width="55" height="55" rx="4" fill="#f97316"/>
  <rect x="265" y="250" width="55" height="55" rx="4" fill="#eab308"/>
  <rect x="330" y="250" width="55" height="55" rx="4" fill="#eab308"/>
  <rect x="395" y="250" width="55" height="55" rx="4" fill="#84cc16"/>
  <rect x="460" y="250" width="55" height="55" rx="4" fill="#84cc16"/>
  <rect x="525" y="250" width="55" height="55" rx="4" fill="#06b6d4"/>
  <rect x="590" y="250" width="55" height="55" rx="4" fill="#06b6d4"/>
  <rect x="655" y="250" width="40" height="55" rx="4" fill="#8b5cf6"/>
  
  <!-- Shelf 3 -->
  <rect x="120" y="325" width="560" height="80" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="135" y="340" width="55" height="55" rx="4" fill="#000000"/>
  <rect x="200" y="340" width="55" height="55" rx="4" fill="#000000"/>
  <rect x="265" y="340" width="55" height="55" rx="4" fill="#16a34a"/>
  <rect x="330" y="340" width="55" height="55" rx="4" fill="#16a34a"/>
  <rect x="395" y="340" width="55" height="55" rx="4" fill="#dc2626"/>
  <rect x="460" y="340" width="55" height="55" rx="4" fill="#dc2626"/>
  <rect x="525" y="340" width="55" height="55" rx="4" fill="#2563eb"/>
  <rect x="590" y="340" width="55" height="55" rx="4" fill="#2563eb"/>
  <rect x="655" y="340" width="40" height="55" rx="4" fill="#7c3aed"/>
  
  <!-- Bottom Shelf - Large Bottles -->
  <rect x="120" y="415" width="560" height="50" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="135" y="420" width="80" height="40" rx="4" fill="#1e40af"/>
  <rect x="225" y="420" width="80" height="40" rx="4" fill="#1e40af"/>
  <rect x="315" y="420" width="80" height="40" rx="4" fill="#b91c1c"/>
  <rect x="405" y="420" width="80" height="40" rx="4" fill="#b91c1c"/>
  <rect x="495" y="420" width="80" height="40" rx="4" fill="#15803d"/>
  <rect x="585" y="420" width="80" height="40" rx="4" fill="#15803d"/>
  
  <!-- Side Decorations -->
  <rect x="50" y="130" width="40" height="335" fill="#0369a1" rx="4"/>
  <rect x="710" y="130" width="40" height="335" fill="#0369a1" rx="4"/>
  <text x="70" y="300" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold" transform="rotate(-90, 70, 300)">COLD DRINKS</text>
  <text x="730" y="300" text-anchor="middle" fill="white" font-family="Arial" font-size="12" font-weight="bold" transform="rotate(90, 730, 300)">COLD DRINKS</text>
</svg>
