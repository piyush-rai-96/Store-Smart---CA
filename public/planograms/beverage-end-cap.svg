<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <!-- Background -->
  <rect width="800" height="500" fill="#f8fafc"/>
  
  <!-- End Cap Frame -->
  <rect x="100" y="30" width="600" height="440" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2"/>
  
