<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <!-- Background -->
  <rect width="800" height="500" fill="#fef7f0"/>
  
  <!-- Display Frame -->
  <rect x="50" y="30" width="700" height="440" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  
  <!-- Header -->
  <rect x="50" y="30" width="700" height="40" rx="8" fill="#b91c1c"/>
  <text x="400" y="57" text-anchor="middle" fill="white" font-family="Arial" font-size="16" font-weight="bold">HOLIDAY DECOR DISPLAY - COMPACT</text>
  
  <!-- Shelf 1 - Christmas Ornaments -->
  <rect x="70" y="85" width="660" height="90" fill="#ffffff" stroke="#fcd34d" stroke-width="1"/>
  <circle cx="110" cy="130" r="25" fill="#dc2626"/>
  <circle cx="170" cy="130" r="25" fill="#16a34a"/>
  <circle cx="230" cy="130" r="25" fill="#eab308"/>
  <circle cx="290" cy="130" r="25" fill="#dc2626"/>
  <circle cx="350" cy="130" r="25" fill="#2563eb"/>
  <circle cx="410" cy="130" r="25" fill="#7c3aed"/>
  <circle cx="470" cy="130" r="25" fill="#16a34a"/>
  <circle cx="530" cy="130" r="25" fill="#eab308"/>
  <circle cx="590" cy="130" r="25" fill="#dc2626"/>
  <circle cx="650" cy="130" r="25" fill="#16a34a"/>
  <circle cx="700" cy="130" r="20" fill="#2563eb"/>
  <text x="400" y="168" text-anchor="middle" fill="#92400e" font-family="Arial" font-size="10">Christmas Ornaments</text>
  
  <!-- Shelf 2 - Lights & Garlands -->
  <rect x="70" y="185" width="660" height="70" fill="#ffffff" stroke="#fcd34d" stroke-width="1"/>
  <rect x="80" y="195" width="100" height="50" rx="4" fill="#fef08a" stroke="#eab308"/>
  <rect x="190" y="195" width="100" height="50" rx="4" fill="#bbf7d0" stroke="#22c55e"/>
  <rect x="300" y="195" width="100" height="50" rx="4" fill="#fecaca" stroke="#dc2626"/>
  <rect x="410" y="195" width="100" height="50" rx="4" fill="#e0e7ff" stroke="#6366f1"/>
  <rect x="520" y="195" width="100" height="50" rx="4" fill="#fef08a" stroke="#eab308"/>
  <rect x="630" y="195" width="90" height="50" rx="4" fill="#bbf7d0" stroke="#22c55e"/>
  <text x="400" y="260" text-anchor="middle" fill="#92400e" font-family="Arial" font-size="10">String Lights & Garlands</text>
  
  <!-- Shelf 3 - Wreaths & Trees -->
  <rect x="70" y="265" width="660" height="90" fill="#ffffff" stroke="#fcd34d" stroke-width="1"/>
  <circle cx="130" cy="310" r="35" fill="#166534" stroke="#15803d" stroke-width="3"/>
  <circle cx="220" cy="310" r="35" fill="#166534" stroke="#15803d" stroke-width="3"/>
  <polygon points="320,275 360,345 280,345" fill="#166534"/>
  <polygon points="420,275 460,345 380,345" fill="#166534"/>
  <polygon points="520,275 560,345 480,345" fill="#166534"/>
  <circle cx="620" cy="310" r="35" fill="#166534" stroke="#dc2626" stroke-width="3"/>
  <circle cx="700" cy="310" r="30" fill="#166534" stroke="#eab308" stroke-width="3"/>
  <text x="400" y="350" text-anchor="middle" fill="#92400e" font-family="Arial" font-size="10">Wreaths & Mini Trees</text>
  
  <!-- Shelf 4 - Candles & Figurines -->
  <rect x="70" y="365" width="660" height="90" fill="#ffffff" stroke="#fcd34d" stroke-width="1"/>
  <rect x="85" y="385" width="30" height="55" rx="2" fill="#fef3c7" stroke="#d97706"/>
  <rect x="125" y="385" width="30" height="55" rx="2" fill="#dc2626"/>
  <rect x="165" y="385" width="30" height="55" rx="2" fill="#fef3c7" stroke="#d97706"/>
  <rect x="205" y="395" width="50" height="45" rx="4" fill="#f87171"/>
  <rect x="265" y="395" width="50" height="45" rx="4" fill="#4ade80"/>
  <rect x="325" y="395" width="50" height="45" rx="4" fill="#fbbf24"/>
  <rect x="385" y="395" width="50" height="45" rx="4" fill="#f87171"/>
  <rect x="445" y="395" width="50" height="45" rx="4" fill="#60a5fa"/>
  <rect x="505" y="385" width="30" height="55" rx="2" fill="#fef3c7" stroke="#d97706"/>
  <rect x="545" y="385" width="30" height="55" rx="2" fill="#dc2626"/>
  <rect x="585" y="385" width="30" height="55" rx="2" fill="#16a34a"/>
  <rect x="625" y="395" width="50" height="45" rx="4" fill="#c084fc"/>
  <rect x="685" y="395" width="35" height="45" rx="4" fill="#fbbf24"/>
  <text x="400" y="450" text-anchor="middle" fill="#92400e" font-family="Arial" font-size="10">Candles & Holiday Figurines</text>
</svg>
